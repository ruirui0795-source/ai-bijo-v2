<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gravure Producer Pro</title>
    <style>
        :root { --primary: #e91e63; --bg: #111; --panel: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h2 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-size: 0.9rem; color: #aaa; }
        select, input, button { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #333; color: #fff; box-sizing: border-box; }
        .api-group { background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        button { background: var(--primary); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        button:hover { background: #c2185b; transform: scale(1.02); }
        button:disabled { background: #555; cursor: not-allowed; }
        img { width: 100%; border-radius: 8px; border: 1px solid #444; background: #000; min-height: 400px; object-fit: contain; }
        .prompt-box { background: #000; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 0.8rem; color: #0f0; min-height: 80px; word-wrap: break-word; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Producer Control</h2>
        
        <div class="api-group">
            <label>xAI (Grok) API Key</label>
            <input type="password" id="grokKey" placeholder="xai-...">
            <label>Google (Gemini) API Key</label>
            <input type="password" id="geminiKey" value="AIzaSyASY_FO2M5BB4HZbQp1bvSTU_dtuCvKB10">
        </div>

        <label>1. モデル選択</label>
        <select id="modelSelect"></select>

        <label>2. 衣装・服装</label>
        <select id="outfitSelect"></select>

        <label>3. ロケーション</label>
        <select id="locationSelect"></select>

        <label>4. スタイル・動作</label>
        <select id="styleSelect"></select>

        <button id="genBtn" onclick="generate()">美女を召喚する</button>
        
        <label>錬成された呪文</label>
        <div id="promptOutput" class="prompt-box">Waiting for command...</div>
    </div>

    <div class="panel">
        <h2>Output Canvas</h2>
        <img id="resultImg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
        <p id="status" style="text-align: center; color: var(--primary); font-weight: bold;"></p>
    </div>
</div>

<script src="database.js"></script>

<script>
    function init() {
        if (typeof MASTER_DATABASE === 'undefined') {
            setTimeout(init, 100)
            return
        }
        
        const setup = (id, list) => {
            const el = document.getElementById(id)
            if(!el) return
            list.forEach(item => {
                const opt = document.createElement('option')
                opt.value = item.prompt
                opt.textContent = item.name
                el.appendChild(opt)
            })
        }

        setup('modelSelect', MASTER_DATABASE.models)
        setup('outfitSelect', MASTER_DATABASE.outfits)
        setup('locationSelect', MASTER_DATABASE.locations)
        setup('styleSelect', MASTER_DATABASE.styles)
    }

    window.onload = init

    async function generate() {
        const gKey = document.getElementById('grokKey').value
        const geminiKey = document.getElementById('geminiKey').value
        const btn = document.getElementById('genBtn')
        const status = document.getElementById('status')

        if (!gKey || !geminiKey) {
            alert('APIキーを入力してね')
            return
        }

        btn.disabled = true
        status.innerText = "Grokがプロンプトを極上に仕上げています..."

        try {
            const rawPrompt = `${document.getElementById('modelSelect').value}, ${document.getElementById('outfitSelect').value}, ${document.getElementById('locationSelect').value}, ${document.getElementById('styleSelect').value}`
            
            const grokRes = await fetch('https://api.x.ai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${gKey}` },
                body: JSON.stringify({
                    model: "grok-beta",
                    messages: [
                        { role: "system", content: "You are an expert image prompt engineer. Enhance the prompt to be hyper-realistic, cinematic, and 4K resolution. Output only the English prompt." },
                        { role: "user", content: rawPrompt }
                    ]
                })
            })
            const grokData = await grokRes.json()
            const finalPrompt = grokData.choices[0].message.content
            document.getElementById('promptOutput').innerText = finalPrompt

            status.innerText = "Geminiが4K画像を錬成しています..."
            
            const imgRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-001:predict?key=${geminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    instances: [{ prompt: finalPrompt }],
                    parameters: { sampleCount: 1, aspectRatio: "1:1" }
                })
            })
            
            const imgData = await imgRes.json()
            
            if(imgData.predictions && imgData.predictions.length > 0) {
                const base64Img = imgData.predictions[0].bytesBase64Encoded
                document.getElementById('resultImg').src = `data:image/jpeg;base64,${base64Img}`
            } else {
                throw new Error("画像が正しく返ってこなかったよ")
            }

            status.innerText = "召喚完了しました"

        } catch (e) {
            console.error(e)
            status.innerText = "エラーが発生しました、キーを確認してね"
        } finally {
            btn.disabled = false
        }
    }
</script>
</body>
</html>
